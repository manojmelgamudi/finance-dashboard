<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinTracker - Cloud Sync</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .modal-overlay { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background-color: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; position: fixed; inset: 0; z-index: 50; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        input, textarea, select { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- IMPORTANT: ADD YOUR CREDENTIALS HERE ---
        const SUPABASE_URL = 'https://blwbigaexnmuensxgkde.supabase.co';
        const SUPABASE_KEY = 'YOUR_LONG_ANON_KEY_STARTING_WITH_EYJ'; // PASTE YOUR KEY HERE
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const svg = window.lucide.createElement(icon);
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) className.split(' ').forEach(cls => cls && svg.classList.add(cls));
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{width: size, height: size}} />;
        };

        const calculateLoanStats = (loan) => {
            const paidAmount = (loan.payments || []).reduce((acc, p) => acc + p.amount, 0);
            const remaining = Math.max(0, loan.amount - paidAmount);
            const progress = Math.min((paidAmount / loan.amount) * 100, 100);
            const isPaid = remaining <= 0.01; 
            let emiInfo = null;
            if (loan.isEmi) {
                const monthlyAmount = loan.customEmiAmount || (loan.amount / (loan.installments || 12));
                emiInfo = { monthly: parseFloat(monthlyAmount).toFixed(2), paidCount: (loan.payments || []).length, totalCount: loan.installments || 12 };
            }
            return { paidAmount, remaining, progress, isPaid, emiInfo };
        };

        const getEMISchedule = (loan) => {
            if (!loan.isEmi) return [];
            const schedule = [];
            const startDate = new Date(loan.date);
            const today = new Date();
            const currentMonthYear = new Date(today.getFullYear(), today.getMonth(), 1);
            const targetEmi = parseFloat(loan.customEmiAmount || (loan.amount / (loan.installments || 12)));

            for (let i = 0; i < (loan.installments || 12); i++) {
                const emiMonthDate = new Date(startDate);
                emiMonthDate.setMonth(startDate.getMonth() + i);
                const emiMonthStart = new Date(emiMonthDate.getFullYear(), emiMonthDate.getMonth(), 1);
                const monthName = emiMonthDate.toLocaleString('default', { month: 'long', year: 'numeric' });
                const paymentsForMonth = (loan.payments || []).filter(p => p.monthIndex === i);
                const totalPaidForMonth = paymentsForMonth.reduce((sum, p) => sum + p.amount, 0);
                let status = 'upcoming';
                if (totalPaidForMonth >= targetEmi - 0.01) status = 'paid';
                else if (totalPaidForMonth > 0) status = 'partial';
                else if (emiMonthStart <= currentMonthYear) status = 'pending';
                schedule.push({ index: i, monthName, totalPaid: totalPaidForMonth, targetAmount: targetEmi, status });
            }
            return schedule;
        };

        const App = () => {
            const CURRENCY = "₹";
            const [debts, setDebts] = useState([]);
            const [isInitialLoad, setIsInitialLoad] = useState(true);
            const [view, setView] = useState('list'); 
            const [selectedDebtId, setSelectedDebtId] = useState(null);
            const [selectedLoanId, setSelectedLoanId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeTab, setActiveTab] = useState('receivable');
            const [showAddDebt, setShowAddDebt] = useState(false);
            const [showAddLoan, setShowAddLoan] = useState(false);
            const [showAddPayment, setShowAddPayment] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isEditing, setIsEditing] = useState(false);

            const [newLoan, setNewLoan] = useState({ 
                name: '', amount: '', isEmi: false, installments: '12', note: '', 
                longNote: '', customEmiAmount: '', date: new Date().toISOString().split('T')[0],
                category: 'receivable'
            });
            const [newTransaction, setNewTransaction] = useState({ amount: '', note: '', monthIndex: null });

            // --- CLOUD SYNC LOGIC ---
            
            // 1. Fetch data from Supabase on launch
            useEffect(() => {
                const fetchCloudData = async () => {
                    try {
                        const { data, error } = await _supabase
                            .from('my_data')
                            .select('content')
                            .eq('id', 1)
                            .single();

                        if (data && data.content) {
                            setDebts(JSON.parse(data.content));
                        } else {
                            const local = localStorage.getItem('fintracker_v5_local');
                            if (local) setDebts(JSON.parse(local));
                        }
                    } catch (e) { console.error("Sync Error:", e); }
                    setIsInitialLoad(false);
                };
                fetchCloudData();
            }, []);

            // 2. Save data to Supabase every time 'debts' changes
            useEffect(() => {
                if (isInitialLoad) return;

                const persistData = async () => {
                    const dataStr = JSON.stringify(debts);
                    localStorage.setItem('fintracker_v5_local', dataStr);
                    
                    await _supabase
                        .from('my_data')
                        .upsert([{ id: 1, content: dataStr }]);
                };

                const timer = setTimeout(persistData, 800); // Small delay to prevent too many API calls
                return () => clearTimeout(timer);
            }, [debts]);

            // --- APP LOGIC ---

            const statsSummary = useMemo(() => {
                let recTotal = 0, recRecvd = 0, payTotal = 0, payPaid = 0;
                debts.forEach(d => {
                    (d.loans || []).forEach(l => {
                        const s = calculateLoanStats(l);
                        if (d.category === 'payable') { payTotal += l.amount; payPaid += s.paidAmount; }
                        else { recTotal += l.amount; recRecvd += s.paidAmount; }
                    });
                });
                return { receivableDue: recTotal - recRecvd, payableDue: payTotal - payPaid };
            }, [debts]);

            const selectedFriend = debts.find(d => d.id === selectedDebtId);

            const friendTotals = useMemo(() => {
                if (!selectedFriend) return { totalLent: 0, totalReceived: 0, remaining: 0, standardDue: 0, emiDue: 0, emiTotal: 0 };
                let totalLent = 0, totalReceived = 0, standardDue = 0, emiDue = 0, emiTotal = 0;
                (selectedFriend.loans || []).forEach(loan => {
                    const stats = calculateLoanStats(loan);
                    totalLent += loan.amount;
                    totalReceived += stats.paidAmount;
                    if (loan.isEmi) { emiTotal += loan.amount; emiDue += stats.remaining; }
                    else { standardDue += stats.remaining; }
                });
                return { totalLent, totalReceived, remaining: standardDue + emiDue, standardDue, emiDue, emiTotal };
            }, [selectedFriend]);

            const handleCreateFriend = (e) => {
                e.preventDefault();
                const updated = [...debts, {
                    id: Date.now().toString(),
                    name: newLoan.name,
                    category: newLoan.category,
                    loans: [{
                        id: 'l-' + Date.now().toString(),
                        amount: parseFloat(newLoan.amount),
                        isEmi: newLoan.isEmi,
                        installments: newLoan.isEmi ? parseInt(newLoan.installments) : null,
                        customEmiAmount: newLoan.isEmi ? parseFloat(newLoan.customEmiAmount) : null,
                        payments: [],
                        note: newLoan.note || 'Initial Record',
                        longNote: newLoan.longNote || '',
                        date: newLoan.date
                    }]
                }];
                setDebts(updated);
                setShowAddDebt(false);
            };

            const handleAddOrEditLoan = (e) => {
                e.preventDefault();
                const loanData = {
                    amount: parseFloat(newLoan.amount),
                    isEmi: newLoan.isEmi,
                    installments: newLoan.isEmi ? parseInt(newLoan.installments) : null,
                    customEmiAmount: newLoan.isEmi ? parseFloat(newLoan.customEmiAmount) : null,
                    note: newLoan.note || 'New Entry',
                    longNote: newLoan.longNote || '',
                    date: newLoan.date
                };
                const updated = debts.map(f => f.id === selectedDebtId ? {
                    ...f, loans: isEditing 
                        ? (f.loans || []).map(l => l.id === selectedLoanId ? { ...l, ...loanData } : l)
                        : [...(f.loans || []), { id: 'l-' + Date.now().toString(), ...loanData, payments: [] }]
                } : f);
                setDebts(updated);
                setShowAddLoan(false);
            };

            const handleAddPayment = (e) => {
                e.preventDefault();
                const updated = debts.map(f => f.id === selectedDebtId ? {
                    ...f, loans: (f.loans || []).map(l => l.id === selectedLoanId ? {
                        ...l, payments: [{ id: Date.now().toString(), amount: parseFloat(newTransaction.amount), note: newTransaction.note, date: new Date().toISOString().split('T')[0], monthIndex: newTransaction.monthIndex }, ...(l.payments || [])]
                    } : l)
                } : f);
                setDebts(updated);
                setShowAddPayment(false);
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col">
                    {/* Header */}
                    <nav className="bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-orange-600 p-2 rounded-xl"><Icon name="Wallet" className="text-white" size={24} /></div>
                                <h1 className="font-black text-2xl tracking-tighter text-white">FinTracker <span className="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full uppercase ml-2 tracking-widest">Synced</span></h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setShowSettings(true)} className="p-2.5 text-slate-400 bg-slate-800/50 rounded-xl border border-slate-700"><Icon name="Settings" size={20} /></button>
                                {view === 'list' && <button onClick={() => setShowAddDebt(true)} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-black uppercase tracking-widest flex items-center gap-2">Add Person</button>}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto w-full px-6 py-8 flex-grow">
                        {view === 'list' ? (
                            <div className="space-y-8 animate-slide-up">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-slate-900/50 p-8 rounded-[2rem] border border-blue-500/20">
                                        <p className="text-xs uppercase font-black text-blue-500 tracking-widest">Receivables</p>
                                        <p className="text-4xl font-black text-slate-100">{CURRENCY}{statsSummary.receivableDue.toLocaleString('en-IN')}</p>
                                    </div>
                                    <div className="bg-slate-900/50 p-8 rounded-[2rem] border border-rose-500/20">
                                        <p className="text-xs uppercase font-black text-rose-500 tracking-widest">Payables</p>
                                        <p className="text-4xl font-black text-slate-100">{CURRENCY}{statsSummary.payableDue.toLocaleString('en-IN')}</p>
                                    </div>
                                </div>

                                <div className="flex bg-slate-900 p-1.5 rounded-2xl border border-slate-800 w-full md:w-80">
                                    <button onClick={() => setActiveTab('receivable')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === 'receivable' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Receivables</button>
                                    <button onClick={() => setActiveTab('payable')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === 'payable' ? 'bg-rose-600 text-white' : 'text-slate-500'}`}>Payables</button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {debts.filter(d => d.category === activeTab).map(friend => {
                                        let bal = 0; (friend.loans || []).forEach(l => { bal += calculateLoanStats(l).remaining; });
                                        return (
                                            <button key={friend.id} onClick={() => { setSelectedDebtId(friend.id); setView('detail'); }} className="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 text-left hover:border-slate-600 transition-all">
                                                <h3 className="font-black text-xl mb-1">{friend.name}</h3>
                                                <p className="text-[10px] text-slate-500 font-black uppercase mb-4 tracking-widest">{(friend.loans || []).length} Records</p>
                                                <p className="text-3xl font-black">{CURRENCY}{bal.toLocaleString('en-IN')}</p>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-slide-up space-y-6">
                                <button onClick={() => setView('list')} className="text-slate-400 font-black uppercase text-xs flex items-center gap-2"><Icon name="ArrowLeft" size={16} /> Back</button>
                                <div className="bg-slate-900 p-8 rounded-[3rem] border border-slate-800">
                                    <h2 className="text-3xl font-black mb-6">{selectedFriend?.name}</h2>
                                    <div className="p-6 bg-slate-950 rounded-2xl border border-slate-800 mb-6">
                                        <p className="text-xs font-black text-slate-500 uppercase mb-1">Total Outstanding</p>
                                        <p className="text-4xl font-black text-white">{CURRENCY}{friendTotals.remaining.toLocaleString('en-IN')}</p>
                                    </div>
                                    <button onClick={() => { setIsEditing(false); setShowAddLoan(true); }} className="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-xs">Add Transaction</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Simple Global Modals (ShowAddDebt as Example) */}
                    {showAddDebt && (
                        <div className="modal-overlay">
                            <div className="bg-slate-900 p-10 rounded-[3rem] w-full max-w-md border border-slate-800">
                                <h2 className="text-2xl font-black mb-6 text-white">Create New Account</h2>
                                <form onSubmit={handleCreateFriend} className="space-y-4">
                                    <input type="text" placeholder="Name" required className="w-full p-4 bg-slate-800 rounded-xl text-white outline-none" value={newLoan.name} onChange={e => setNewLoan({...newLoan, name: e.target.value})} />
                                    <select className="w-full p-4 bg-slate-800 rounded-xl text-white outline-none" value={newLoan.category} onChange={e => setNewLoan({...newLoan, category: e.target.value})}>
                                        <option value="receivable">Receivable (I Lent)</option>
                                        <option value="payable">Payable (I Borrowed)</option>
                                    </select>
                                    <input type="number" placeholder="Initial Amount" required className="w-full p-4 bg-slate-800 rounded-xl text-white outline-none" value={newLoan.amount} onChange={e => setNewLoan({...newLoan, amount: e.target.value})} />
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setShowAddDebt(false)} className="flex-1 p-4 bg-slate-800 rounded-xl font-black text-xs uppercase">Cancel</button>
                                        <button type="submit" className="flex-1 p-4 bg-blue-600 rounded-xl font-black text-xs uppercase">Save</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
