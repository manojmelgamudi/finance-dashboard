<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinTracker - Cloud Sync Fixed</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; padding: 0; }
        .modal-overlay { backdrop-filter: blur(12px); background-color: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 50; padding: 20px; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- UPDATE THESE WITH YOUR ACTUAL KEYS ---
        const SUPABASE_URL = 'https://blwbigaexnmuensxgkde.supabase.co';
        const SUPABASE_KEY = 'YOUR_LONG_ANON_KEY_HERE'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const svg = window.lucide.createElement(icon);
                        svg.setAttribute('width', size); svg.setAttribute('height', size);
                        if (className) className.split(' ').forEach(cls => cls && svg.classList.add(cls));
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        };

        const App = () => {
            const CURRENCY = "₹";
            const [debts, setDebts] = useState([]);
            const [isInitialLoad, setIsInitialLoad] = useState(true);
            const [view, setView] = useState('list');
            const [selectedDebtId, setSelectedDebtId] = useState(null);
            const [showAddDebt, setShowAddDebt] = useState(false);
            const [showAddLoan, setShowAddLoan] = useState(false);
            const [activeTab, setActiveTab] = useState('receivable');

            const [newLoan, setNewLoan] = useState({ 
                name: '', amount: '', note: '', category: 'receivable', date: new Date().toISOString().split('T')[0] 
            });

            // Load Data
            useEffect(() => {
                const fetchSync = async () => {
                    const { data } = await _supabase.from('my_data').select('content').eq('id', 1).single();
                    if (data?.content) setDebts(JSON.parse(data.content));
                    else {
                        const local = localStorage.getItem('fintracker_v5_local');
                        if (local) setDebts(JSON.parse(local));
                    }
                    setIsInitialLoad(false);
                };
                fetchSync();
            }, []);

            // Save Data
            useEffect(() => {
                if (isInitialLoad) return;
                const save = async () => {
                    const str = JSON.stringify(debts);
                    localStorage.setItem('fintracker_v5_local', str);
                    await _supabase.from('my_data').upsert([{ id: 1, content: str }]);
                };
                const t = setTimeout(save, 500);
                return () => clearTimeout(t);
            }, [debts]);

            const selectedFriend = debts.find(d => d.id === selectedDebtId);

            const handleAddTransaction = (e) => {
                e.preventDefault();
                const transaction = {
                    id: 'l-' + Date.now(),
                    amount: parseFloat(newLoan.amount),
                    note: newLoan.note,
                    date: newLoan.date,
                    payments: []
                };
                setDebts(debts.map(d => d.id === selectedDebtId ? { ...d, loans: [...(d.loans || []), transaction] } : d));
                setShowAddLoan(false);
                setNewLoan({ ...newLoan, amount: '', note: '' });
            };

            const handleCreatePerson = (e) => {
                e.preventDefault();
                const person = {
                    id: Date.now().toString(),
                    name: newLoan.name,
                    category: newLoan.category,
                    loans: [{ id: 'l-'+Date.now(), amount: parseFloat(newLoan.amount), note: 'Initial', date: newLoan.date, payments: [] }]
                };
                setDebts([...debts, person]);
                setShowAddDebt(false);
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100">
                    <nav className="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-40">
                        <h1 className="font-black text-xl tracking-tighter italic">FIN<span className="text-blue-500">TRACKER</span></h1>
                        {view === 'list' && <button onClick={() => setShowAddDebt(true)} className="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest">Add Person</button>}
                    </nav>

                    <main className="p-6 max-w-4xl mx-auto">
                        {view === 'list' ? (
                            <div className="space-y-6">
                                <div className="flex gap-2 bg-slate-900 p-1 rounded-xl">
                                    <button onClick={() => setActiveTab('receivable')} className={`flex-1 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest ${activeTab === 'receivable' ? 'bg-blue-600' : 'text-slate-500'}`}>Receivables</button>
                                    <button onClick={() => setActiveTab('payable')} className={`flex-1 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest ${activeTab === 'payable' ? 'bg-rose-600' : 'text-slate-500'}`}>Payables</button>
                                </div>
                                {debts.filter(d => d.category === activeTab).map(f => (
                                    <div key={f.id} onClick={() => { setSelectedDebtId(f.id); setView('detail'); }} className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                        <p className="text-xs font-bold text-slate-500 uppercase">{f.name}</p>
                                        <p className="text-2xl font-black">{CURRENCY}{(f.loans || []).reduce((s, l) => s + l.amount, 0).toLocaleString()}</p>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <button onClick={() => setView('list')} className="text-slate-500 text-xs font-bold uppercase tracking-widest flex items-center gap-2"><Icon name="ArrowLeft" size={14} /> Back</button>
                                <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                                    <h2 className="text-3xl font-black mb-6">{selectedFriend?.name}</h2>
                                    <button onClick={() => setShowAddLoan(true)} className="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-blue-900/20">Add Transaction</button>
                                    <div className="mt-8 space-y-4">
                                        {(selectedFriend?.loans || []).map(l => (
                                            <div key={l.id} className="p-4 bg-slate-950 rounded-xl border border-slate-800 flex justify-between items-center">
                                                <div><p className="text-xs font-bold text-slate-400">{l.note}</p><p className="text-lg font-black">{CURRENCY}{l.amount.toLocaleString()}</p></div>
                                                <p className="text-[10px] text-slate-600 font-bold">{l.date}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL: ADD TRANSACTION (This was the missing part!) */}
                    {showAddLoan && (
                        <div className="modal-overlay">
                            <div className="bg-slate-900 p-8 rounded-[2.5rem] w-full max-w-md animate-slide-up border border-slate-800">
                                <h2 className="text-2xl font-black mb-6">New Transaction</h2>
                                <form onSubmit={handleAddTransaction} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Amount</label>
                                        <input type="number" required autoFocus className="w-full p-4 bg-slate-800 rounded-xl outline-none text-white font-bold" value={newLoan.amount} onChange={e => setNewLoan({...newLoan, amount: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Reason</label>
                                        <input type="text" placeholder="e.g. Lunch" className="w-full p-4 bg-slate-800 rounded-xl outline-none text-white font-bold" value={newLoan.note} onChange={e => setNewLoan({...newLoan, note: e.target.value})} />
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setShowAddLoan(false)} className="flex-1 py-4 bg-slate-800 rounded-xl font-bold text-xs uppercase text-slate-400">Cancel</button>
                                        <button type="submit" className="flex-1 py-4 bg-blue-600 rounded-xl font-bold text-xs uppercase">Add Entry</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: ADD PERSON */}
                    {showAddDebt && (
                        <div className="modal-overlay">
                            <div className="bg-slate-900 p-8 rounded-[2.5rem] w-full max-w-md animate-slide-up border border-slate-800">
                                <h2 className="text-2xl font-black mb-6">Create Account</h2>
                                <form onSubmit={handleCreatePerson} className="space-y-4">
                                    <input type="text" placeholder="Person Name" required className="w-full p-4 bg-slate-800 rounded-xl outline-none text-white font-bold" value={newLoan.name} onChange={e => setNewLoan({...newLoan, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="Amount" required className="w-full p-4 bg-slate-800 rounded-xl outline-none text-white font-bold" value={newLoan.amount} onChange={e => setNewLoan({...newLoan, amount: e.target.value})} />
                                        <select className="bg-slate-800 p-4 rounded-xl font-bold text-xs outline-none" value={newLoan.category} onChange={e => setNewLoan({...newLoan, category: e.target.value})}>
                                            <option value="receivable">Receivable</option>
                                            <option value="payable">Payable</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setShowAddDebt(false)} className="flex-1 py-4 bg-slate-800 rounded-xl font-bold text-xs uppercase text-slate-400">Cancel</button>
                                        <button type="submit" className="flex-1 py-4 bg-blue-600 rounded-xl font-bold text-xs uppercase">Create</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
