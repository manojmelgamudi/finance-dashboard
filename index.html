<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinTracker - Cloud Sync Manager</title>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, getDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9; 
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .modal-overlay { 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            background-color: rgba(0,0,0,0.7); 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
            position: fixed;
            inset: 0;
            z-index: 50;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; border: 2px solid #0f172a; }
        input, textarea, select { font-size: 16px !important; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .modal-container { max-height: 90vh; display: flex; flex-direction: column; width: 100%; }
        .modal-body { overflow-y: auto; padding-right: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, getDoc } = window.FirebaseSDK;

        // --- Integrated Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyC02K8LYYlE0R4hsuk5B0Ucg0j4uK9N1KM",
            authDomain: "fintracker-sync-a0e1d.firebaseapp.com",
            databaseURL: "https://fintracker-sync-a0e1d-default-rtdb.firebaseio.com",
            projectId: "fintracker-sync-a0e1d",
            storageBucket: "fintracker-sync-a0e1d.firebasestorage.app",
            messagingSenderId: "439893398028",
            appId: "1:439893398028:web:54317cc125c6f6d0589429"
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                const renderIcon = () => {
                    if (ref.current && window.lucide) {
                        ref.current.innerHTML = '';
                        const icon = window.lucide.icons[name];
                        if (icon) {
                            const svg = window.lucide.createElement(icon);
                            svg.setAttribute('width', size);
                            svg.setAttribute('height', size);
                            if (className) className.split(' ').forEach(cls => cls && svg.classList.add(cls));
                            ref.current.appendChild(svg);
                        }
                    }
                };
                renderIcon();
                if (!window.lucide) {
                    const timer = setInterval(() => { if (window.lucide) { renderIcon(); clearInterval(timer); } }, 200);
                    return () => clearInterval(timer);
                }
            }, [name, size, className]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{width: size, height: size}} />;
        };

        const calculateLoanStats = (loan) => {
            const paidAmount = (loan.payments || []).reduce((acc, p) => acc + p.amount, 0);
            const remaining = Math.max(0, loan.amount - paidAmount);
            const progress = Math.min((paidAmount / loan.amount) * 100, 100);
            const isPaid = remaining <= 0.01; 
            let emiInfo = null;
            if (loan.isEmi) {
                const monthlyAmount = loan.customEmiAmount || (loan.amount / (loan.installments || 12));
                emiInfo = { monthly: parseFloat(monthlyAmount).toFixed(2), paidCount: (loan.payments || []).length, totalCount: loan.installments || 12 };
            }
            return { paidAmount, remaining, progress, isPaid, emiInfo };
        };

        const getEMISchedule = (loan) => {
            if (!loan.isEmi) return [];
            const schedule = [];
            const startDate = new Date(loan.date);
            const today = new Date();
            const currentMonthYear = new Date(today.getFullYear(), today.getMonth(), 1);
            const targetEmi = parseFloat(loan.customEmiAmount || (loan.amount / (loan.installments || 12)));
            for (let i = 0; i < (loan.installments || 12); i++) {
                const emiMonthDate = new Date(startDate);
                emiMonthDate.setMonth(startDate.getMonth() + i);
                const emiMonthStart = new Date(emiMonthDate.getFullYear(), emiMonthDate.getMonth(), 1);
                const monthName = emiMonthDate.toLocaleString('default', { month: 'long', year: 'numeric' });
                const paymentsForMonth = (loan.payments || []).filter(p => p.monthIndex === i);
                const totalPaidForMonth = paymentsForMonth.reduce((sum, p) => sum + p.amount, 0);
                let status = 'upcoming';
                if (totalPaidForMonth >= targetEmi - 0.01) status = 'paid';
                else if (totalPaidForMonth > 0) status = 'partial';
                else if (emiMonthStart <= currentMonthYear) status = 'pending';
                schedule.push({ index: i, monthName, totalPaid: totalPaidForMonth, targetAmount: targetEmi, status });
            }
            return schedule;
        };

        const App = () => {
            const CURRENCY = "₹";
            const [debts, setDebts] = useState([]);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState('offline');
            const [manualId, setManualId] = useState('');
            const [authError, setAuthError] = useState(null);

            const [view, setView] = useState('list'); 
            const [selectedDebtId, setSelectedDebtId] = useState(null);
            const [selectedLoanId, setSelectedLoanId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeTab, setActiveTab] = useState('receivable');
            
            const [showAddDebt, setShowAddDebt] = useState(false);
            const [showAddLoan, setShowAddLoan] = useState(false);
            const [showAddPayment, setShowAddPayment] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isEditing, setIsEditing] = useState(false);

            const [newLoan, setNewLoan] = useState({ 
                name: '', amount: '', isEmi: false, installments: '12', note: '', 
                longNote: '', customEmiAmount: '', date: new Date().toISOString().split('T')[0],
                category: 'receivable'
            });
            const [newTransaction, setNewTransaction] = useState({ amount: '', note: '', monthIndex: null });

            // Initialize Firebase
            const app = useMemo(() => initializeApp(firebaseConfig), []);
            const auth = useMemo(() => getAuth(app), [app]);
            const db = useMemo(() => getFirestore(app), [app]);
            const appId = "fintracker-v6";

            // Auth & Data Listener
            useEffect(() => {
                const setup = async () => {
                    try {
                        const localSyncId = localStorage.getItem('fintracker_sync_id');
                        let uid;
                        
                        try {
                            if (localSyncId) {
                                uid = localSyncId;
                                setUser({ uid });
                            } else {
                                const credential = await signInAnonymously(auth);
                                uid = credential.user.uid;
                                setUser(credential.user);
                                localStorage.setItem('fintracker_sync_id', uid);
                            }
                            setSyncStatus('online');
                        } catch (ae) {
                            console.error("Auth Error", ae);
                            setSyncStatus('error');
                            setAuthError("Auth Configuration Error. Please enable 'Anonymous' authentication in your Firebase Console.");
                            // Fallback to local storage
                            const saved = localStorage.getItem('fintracker_v6_local');
                            if (saved) setDebts(JSON.parse(saved));
                            setLoading(false);
                            return;
                        }

                        const docRef = doc(db, 'artifacts', appId, 'users', uid, 'data', 'records');
                        const unsub = onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                setDebts(docSnap.data().list || []);
                            }
                            setLoading(false);
                        }, (err) => {
                            console.error("Snapshot error", err);
                            setLoading(false);
                        });
                        return unsub;
                    } catch (e) {
                        console.error(e);
                        setLoading(false);
                    }
                };
                setup();
            }, [auth, db]);

            // Save Function
            const pushData = async (newList) => {
                setDebts(newList);
                localStorage.setItem('fintracker_v6_local', JSON.stringify(newList));
                if (!user || !db || syncStatus !== 'online') return;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'records'), { 
                        list: newList,
                        updatedAt: new Date().toISOString()
                    });
                } catch (e) { console.error("Sync failed", e); }
            };

            const statsSummary = useMemo(() => {
                let recTotal = 0, recRecvd = 0;
                let payTotal = 0, payPaid = 0;
                debts.forEach(d => {
                    (d.loans || []).forEach(l => {
                        const s = calculateLoanStats(l);
                        if (d.category === 'payable') { payTotal += l.amount; payPaid += s.paidAmount; }
                        else { recTotal += l.amount; recRecvd += s.paidAmount; }
                    });
                });
                return { receivableDue: recTotal - recRecvd, payableDue: payTotal - payPaid };
            }, [debts]);

            const selectedFriend = debts.find(d => d.id === selectedDebtId);

            const friendTotals = useMemo(() => {
                if (!selectedFriend) return { totalLent: 0, totalReceived: 0, remaining: 0, standardDue: 0, emiDue: 0, emiTotal: 0 };
                let totalLent = 0, totalReceived = 0, standardDue = 0, emiDue = 0, emiTotal = 0;
                (selectedFriend.loans || []).forEach(loan => {
                    const stats = calculateLoanStats(loan);
                    totalLent += loan.amount;
                    totalReceived += stats.paidAmount;
                    if (loan.isEmi) { emiTotal += loan.amount; emiDue += stats.remaining; }
                    else { standardDue += stats.remaining; }
                });
                return { totalLent, totalReceived, remaining: standardDue + emiDue, standardDue, emiDue, emiTotal };
            }, [selectedFriend]);

            const handleCreateFriend = (e) => {
                e.preventDefault();
                const updated = [...debts, {
                    id: Date.now().toString(),
                    name: newLoan.name,
                    category: newLoan.category,
                    loans: [{
                        id: 'l-' + Date.now().toString(),
                        amount: parseFloat(newLoan.amount),
                        isEmi: newLoan.isEmi,
                        installments: newLoan.isEmi ? parseInt(newLoan.installments) : null,
                        customEmiAmount: newLoan.isEmi ? parseFloat(newLoan.customEmiAmount) : null,
                        payments: [],
                        note: newLoan.note || (newLoan.category === 'receivable' ? 'Lent' : 'Borrowed'),
                        longNote: newLoan.longNote || '',
                        date: newLoan.date
                    }]
                }];
                pushData(updated);
                setNewLoan({ name: '', amount: '', isEmi: false, installments: '12', note: '', longNote: '', customEmiAmount: '', date: new Date().toISOString().split('T')[0], category: activeTab });
                setShowAddDebt(false);
            };

            const handleAddOrEditLoan = (e) => {
                e.preventDefault();
                const loanData = {
                    amount: parseFloat(newLoan.amount),
                    isEmi: newLoan.isEmi,
                    installments: newLoan.isEmi ? parseInt(newLoan.installments) : null,
                    customEmiAmount: newLoan.isEmi ? parseFloat(newLoan.customEmiAmount) : null,
                    note: newLoan.note || (newLoan.isEmi ? 'EMI Plan' : 'Transaction'),
                    longNote: newLoan.longNote || '',
                    date: newLoan.date
                };
                const updated = debts.map(f => f.id === selectedDebtId ? {
                    ...f, loans: isEditing 
                        ? (f.loans || []).map(l => l.id === selectedLoanId ? { ...l, ...loanData } : l)
                        : [...(f.loans || []), { id: 'l-' + Date.now().toString(), ...loanData, payments: [] }]
                } : f);
                pushData(updated);
                setIsEditing(false);
                setNewLoan({ name: '', amount: '', isEmi: false, installments: '12', note: '', longNote: '', customEmiAmount: '', date: new Date().toISOString().split('T')[0], category: activeTab });
                setShowAddLoan(false);
            };

            const openEditModal = (loan) => {
                setSelectedLoanId(loan.id);
                setNewLoan({ name: selectedFriend.name, amount: loan.amount, isEmi: loan.isEmi, installments: loan.installments || '12', note: loan.note, longNote: loan.longNote || '', customEmiAmount: loan.customEmiAmount || '', date: loan.date, category: selectedFriend.category });
                setIsEditing(true);
                setShowAddLoan(true);
            };

            const handleAddPayment = (e) => {
                e.preventDefault();
                const updated = debts.map(f => f.id === selectedDebtId ? {
                    ...f, loans: (f.loans || []).map(l => l.id === selectedLoanId ? {
                        ...l, payments: [{ id: Date.now().toString(), amount: parseFloat(newTransaction.amount), note: newTransaction.note, date: new Date().toISOString().split('T')[0], monthIndex: newTransaction.monthIndex }, ...(l.payments || [])]
                    } : l)
                } : f);
                pushData(updated);
                setNewTransaction({ amount: '', note: '', monthIndex: null });
                setShowAddPayment(false);
            };

            const joinSyncId = async () => {
                if (!manualId.trim()) return;
                if (confirm('Link this device to a new Sync ID? Local data will be overwritten by the cloud data of that ID.')) {
                    localStorage.setItem('fintracker_sync_id', manualId.trim());
                    window.location.reload();
                }
            };

            const exportData = () => {
                const dataStr = JSON.stringify(debts, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const link = document.createElement('a');
                link.setAttribute('href', dataUri);
                link.setAttribute('download', `FinTracker_Backup.json`);
                link.click();
            };

            const importData = (event) => {
                const reader = new FileReader();
                reader.readAsText(event.target.files[0], "UTF-8");
                reader.onload = e => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (confirm('Import backup? This replaces existing data.')) {
                            pushData(json);
                            setShowSettings(false);
                        }
                    } catch (err) { alert('Invalid backup.'); }
                };
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-950"><Icon name="Loader2" className="animate-spin text-orange-500" size={40} /></div>;

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col">
                    {/* Header */}
                    <nav className="bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 sticky top-0 z-40 shrink-0">
                        <div className="max-w-7xl mx-auto px-6 h-16 sm:h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-orange-600 p-2.5 rounded-xl shadow-lg shadow-orange-900/20"><Icon name="Wallet" className="text-white" size={24} /></div>
                                <div>
                                    <h1 className="font-black text-xl sm:text-2xl tracking-tighter text-white leading-none">FinTracker</h1>
                                    <div className="flex items-center gap-2 mt-1">
                                        <div className={`w-2 h-2 rounded-full ${syncStatus === 'online' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : (syncStatus === 'error' ? 'bg-rose-500' : 'bg-slate-600')}`} />
                                        <span className="text-[8px] font-black uppercase text-slate-500 tracking-widest">{syncStatus}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setShowSettings(true)} className="p-3 text-slate-400 hover:text-white transition-all bg-slate-800/50 rounded-2xl border border-slate-700"><Icon name="Settings" size={22} /></button>
                                {view === 'list' && (
                                    <button onClick={() => { setIsEditing(false); setNewLoan(prev => ({...prev, category: activeTab})); setShowAddDebt(true); }} className="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs sm:text-sm font-black uppercase tracking-widest flex items-center gap-3 hover:bg-blue-500 transition-all shadow-xl shadow-blue-900/20"><Icon name="Plus" size={20} /> Add Entry</button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto w-full px-6 py-8 flex-grow">
                        {authError && (
                            <div className="mb-8 p-4 bg-rose-500/10 border border-rose-500/20 rounded-2xl text-rose-500 text-xs font-bold flex items-center gap-3">
                                <Icon name="AlertCircle" size={16} /> {authError}
                            </div>
                        )}

                        {view === 'list' ? (
                            <div className="space-y-8 animate-slide-up">
                                {/* Global Stats */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-slate-900/40 p-10 rounded-[2.5rem] border border-blue-500/10 shadow-2xl flex items-center justify-between group hover:border-blue-500/30 transition-all">
                                        <div className="space-y-1"><p className="text-xs uppercase font-black text-blue-500 tracking-[0.2em]">Receivables</p><p className="text-5xl font-black text-slate-100 tracking-tighter">{CURRENCY}{statsSummary.receivableDue.toLocaleString('en-IN')}</p></div>
                                        <div className="p-5 bg-blue-500/10 rounded-3xl text-blue-500 group-hover:scale-110 transition-transform"><Icon name="TrendingUp" size={40} /></div>
                                    </div>
                                    <div className="bg-slate-900/40 p-10 rounded-[2.5rem] border border-rose-500/10 shadow-2xl flex items-center justify-between group hover:border-rose-500/30 transition-all">
                                        <div className="space-y-1"><p className="text-xs uppercase font-black text-rose-500 tracking-[0.2em]">Payables</p><p className="text-5xl font-black text-slate-100 tracking-tighter">{CURRENCY}{statsSummary.payableDue.toLocaleString('en-IN')}</p></div>
                                        <div className="p-5 bg-rose-500/10 rounded-3xl text-rose-500 group-hover:scale-110 transition-transform"><Icon name="TrendingDown" size={40} /></div>
                                    </div>
                                </div>

                                <div className="flex flex-col md:flex-row gap-6">
                                    <div className="flex bg-slate-900 p-2 rounded-2xl border border-slate-800 w-full md:w-96 shadow-lg">
                                        <button onClick={() => setActiveTab('receivable')} className={`flex-1 py-4 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${activeTab === 'receivable' ? 'bg-blue-600 text-white shadow-xl shadow-blue-900/20' : 'text-slate-500 hover:text-slate-400'}`}>Receivables</button>
                                        <button onClick={() => setActiveTab('payable')} className={`flex-1 py-4 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${activeTab === 'payable' ? 'bg-rose-600 text-white shadow-xl shadow-rose-900/20' : 'text-slate-500 hover:text-slate-400'}`}>Payables</button>
                                    </div>
                                    <div className="relative flex-grow">
                                        <Icon name="Search" className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-500" size={20} />
                                        <input type="text" placeholder={`Filter ${activeTab} accounts...`} className="w-full pl-16 pr-8 py-5 bg-slate-900 border border-slate-800 rounded-3xl outline-none focus:ring-2 focus:ring-blue-500 shadow-lg text-slate-100 placeholder-slate-600 font-medium text-lg" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
                                    {debts.filter(d => d.category === activeTab && d.name.toLowerCase().includes(searchTerm.toLowerCase())).map(friend => {
                                        let friendOwed = 0; friend.loans.forEach(l => { friendOwed += calculateLoanStats(l).remaining; });
                                        return (
                                            <button key={friend.id} onClick={() => { setSelectedDebtId(friend.id); setView('detail'); }} className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-md flex flex-col items-start gap-8 group hover:border-slate-600 hover:bg-slate-800/20 transition-all text-left">
                                                <div className="flex items-center gap-5 w-full">
                                                    <div className={`w-16 h-16 bg-slate-800 rounded-[1.5rem] flex items-center justify-center shadow-inner ${friend.category === 'payable' ? 'text-rose-400' : 'text-blue-400'}`}><Icon name="User" size={32} /></div>
                                                    <div className="flex-grow"><h3 className="font-black text-slate-100 text-2xl leading-none mb-2">{friend.name}</h3><p className="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]">{friend.loans.length} Accounts</p></div>
                                                    <Icon name="ChevronRight" className="text-slate-700 group-hover:text-blue-500 group-hover:translate-x-1 transition-all" size={24} />
                                                </div>
                                                <div className="w-full pt-6 border-t border-slate-800/50">
                                                    <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">Balance Due</p>
                                                    <p className="font-black text-white text-4xl tracking-tighter">{CURRENCY}{friendOwed.toLocaleString('en-IN')}</p>
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-slide-up pb-32">
                                <div className="flex items-center justify-between">
                                    <button onClick={() => setView('list')} className="bg-slate-900 border border-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 hover:text-white transition-all shadow-sm hover:bg-slate-800"><Icon name="ArrowLeft" size={16} /> Dashboard</button>
                                    <button onClick={() => { if(confirm(`Erase all records for ${selectedFriend?.name}?`)) { const updated = debts.filter(d => d.id !== selectedDebtId); pushData(updated); setView('list'); }}} className="p-3 text-rose-500/30 hover:text-rose-500 transition-all bg-slate-900 border border-slate-800 rounded-2xl"><Icon name="Trash2" size={22} /></button>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                                    <div className="lg:col-span-1 bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 text-center shadow-2xl relative overflow-hidden sticky top-24">
                                        <div className={`w-28 h-28 bg-slate-800 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 shadow-inner border border-slate-700 ${selectedFriend?.category === 'payable' ? 'text-rose-400' : 'text-blue-400'}`}><Icon name="User" size={48} /></div>
                                        <h2 className="text-4xl font-black text-white mb-2 tracking-tighter">{selectedFriend?.name}</h2>
                                        <p className={`text-xs font-black uppercase tracking-[0.4em] mb-12 ${selectedFriend?.category === 'payable' ? 'text-rose-500' : 'text-blue-500'}`}>{selectedFriend?.category === 'payable' ? 'Payable' : 'Receivable'}</p>
                                        
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center p-6 bg-slate-950/50 rounded-3xl border border-slate-800"><p className="text-[10px] font-black uppercase text-slate-500 tracking-widest">{selectedFriend?.category === 'payable' ? 'Borrowed' : 'Lent'}</p><p className="font-black text-2xl text-white">{CURRENCY}{friendTotals.totalLent.toLocaleString('en-IN')}</p></div>
                                            <div className="flex justify-between items-center p-6 bg-slate-950/50 rounded-3xl border border-slate-800"><p className="text-[10px] font-black uppercase text-emerald-500 tracking-widest">{selectedFriend?.category === 'payable' ? 'Paid' : 'Received'}</p><p className="font-black text-2xl text-emerald-400">{CURRENCY}{friendTotals.totalReceived.toLocaleString('en-IN')}</p></div>
                                        </div>

                                        <div className="mt-12 grid grid-cols-2 gap-4 border-t border-slate-800 pt-10 mb-8">
                                            {selectedFriend?.category === 'receivable' ? (
                                                <div className="text-left"><p className="text-[8px] font-black uppercase text-slate-500 mb-1">Other Due</p><p className="font-black text-lg text-blue-400">{CURRENCY}{friendTotals.standardDue.toLocaleString('en-IN')}</p></div>
                                            ) : (
                                                <div className="text-left"><p className="text-[8px] font-black uppercase text-slate-500 mb-1">EMI Total</p><p className="font-black text-lg text-purple-400/60">{CURRENCY}{friendTotals.emiTotal.toLocaleString('en-IN')}</p></div>
                                            )}
                                            <div className="text-right"><p className="text-[8px] font-black uppercase text-purple-400 mb-1">EMI Due</p><p className="font-black text-lg text-purple-400">{CURRENCY}{friendTotals.emiDue.toLocaleString('en-IN')}</p></div>
                                        </div>

                                        <div className="p-8 bg-orange-600/10 rounded-[2.5rem] border-2 border-orange-600/20 shadow-lg"><p className="text-xs font-black uppercase text-orange-500 mb-2 tracking-[0.2em]">Net Outstanding</p><p className="font-black text-5xl text-white tracking-tighter">{CURRENCY}{friendTotals.remaining.toLocaleString('en-IN')}</p></div>
                                    </div>

                                    <div className="lg:col-span-2 space-y-8">
                                        <button onClick={() => { setIsEditing(false); setShowAddLoan(true); }} className={`w-full py-6 text-white rounded-[2.5rem] font-black uppercase text-base tracking-[0.3em] flex items-center justify-center gap-5 shadow-2xl hover:scale-[1.01] transition-all ${selectedFriend?.category === 'payable' ? 'bg-rose-600' : 'bg-blue-600'}`}><Icon name="Plus" size={24} /> New Entry</button>
                                        
                                        <div className="space-y-8">
                                            {(selectedFriend?.loans || []).map(loan => {
                                                const stats = calculateLoanStats(loan);
                                                const schedule = getEMISchedule(loan);
                                                const lumpsumPayments = (loan.payments || []).filter(p => p.monthIndex === null || p.monthIndex === undefined);
                                                const lumpsumTotal = lumpsumPayments.reduce((acc, p) => acc + p.amount, 0);
                                                
                                                return (
                                                    <div key={loan.id} className={`bg-slate-900 border rounded-[3.5rem] overflow-hidden shadow-2xl transition-all ${stats.isPaid ? 'border-emerald-900/50' : 'border-slate-800'}`}>
                                                        <div className="p-12">
                                                            <div className="flex justify-between items-start mb-10">
                                                                <div className="space-y-3">
                                                                    <div className="flex items-center gap-3"><span className={`text-[10px] font-black uppercase px-3 py-1.5 rounded-xl ${loan.isEmi ? 'bg-purple-900/30 text-purple-400' : (selectedFriend.category === 'payable' ? 'bg-rose-900/30 text-rose-400' : 'bg-blue-900/30 text-blue-400')}`}>{loan.isEmi ? 'EMI' : 'Standard'}</span><span className="text-sm text-slate-500 font-bold tracking-widest">{loan.date}</span></div>
                                                                    <h4 className="font-black text-white text-3xl tracking-tight leading-none">{loan.note}</h4>
                                                                    {loan.longNote && <p className="text-base text-slate-400 whitespace-pre-wrap mt-4 border-l-4 border-slate-800 pl-6 italic">{loan.longNote}</p>}
                                                                </div>
                                                                <div className="flex gap-3">
                                                                    <button onClick={() => openEditModal(loan)} className="text-slate-500 p-4 bg-slate-800 rounded-2xl hover:text-blue-400 transition-all"><Icon name="Edit3" size={20} /></button>
                                                                    <button onClick={() => {if(confirm('Delete record?')) { const updated = debts.map(f => f.id === selectedDebtId ? {...f, loans: f.loans.filter(l => l.id !== loan.id)} : f); pushData(updated); }} } className="text-slate-500 p-4 bg-slate-800 rounded-2xl hover:text-rose-500 transition-all"><Icon name="Trash2" size={20} /></button>
                                                                </div>
                                                            </div>
                                                            <div className="grid grid-cols-2 gap-12 mb-12">
                                                                <div><p className="text-xs font-black uppercase text-slate-500 mb-2 tracking-[0.2em]">Principal</p><p className="font-black text-4xl tracking-tighter text-white">{CURRENCY}{loan.amount.toLocaleString('en-IN')}</p></div>
                                                                <div className="text-right"><p className="text-xs font-black uppercase text-slate-500 mb-2 tracking-[0.2em]">Remaining</p><p className={`font-black text-4xl tracking-tighter ${stats.isPaid ? 'text-emerald-400' : 'text-orange-400'}`}>{CURRENCY}{stats.remaining.toLocaleString('en-IN')}</p></div>
                                                            </div>
                                                            <div className="w-full bg-slate-800 h-4 rounded-full overflow-hidden shadow-inner mb-3"><div className={`h-full transition-all duration-1000 ${stats.isPaid ? 'bg-emerald-500' : (selectedFriend.category === 'payable' ? 'bg-rose-600' : 'bg-blue-600')}`} style={{ width: `${stats.progress}%` }} /></div>
                                                            
                                                            {loan.isEmi && (
                                                                <div className="space-y-8 mt-12">
                                                                    <div className="glass-panel rounded-[3rem] p-10 space-y-8">
                                                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                                                            <div className="flex items-center gap-4 text-purple-400 font-black"><Icon name="Calendar" size={24} /><p className="text-xs uppercase tracking-[0.3em]">Monthly Ledger</p></div>
                                                                            <div className="flex items-center gap-4">
                                                                                <p className="text-xs font-black uppercase bg-slate-900 border border-purple-500/30 text-purple-400 px-5 py-2.5 rounded-2xl">EMI: {CURRENCY}{stats.emiInfo.monthly}</p>
                                                                                {!stats.isPaid && <button onClick={() => { setSelectedLoanId(loan.id); setNewTransaction({ amount: '', note: 'Lumpsum Payment' }); setShowAddPayment(true); }} className="text-xs font-black uppercase bg-slate-800 border border-slate-700 text-white px-5 py-2.5 rounded-2xl hover:bg-slate-700 transition-all">Lumpsum</button>}
                                                                            </div>
                                                                        </div>
                                                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                                                            {schedule.map(slot => (
                                                                                <div key={slot.index} className="flex justify-between items-center bg-slate-950/40 p-5 rounded-3xl border border-slate-800">
                                                                                    <div className="flex items-center gap-5"><div className={`w-4 h-4 rounded-full ${slot.status === 'paid' ? 'bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.3)]' : slot.status === 'pending' ? 'bg-rose-500 animate-pulse' : slot.status === 'partial' ? 'bg-amber-400' : 'bg-slate-700'}`} /><span className="text-sm font-black text-slate-300 tracking-tight">{slot.monthName}</span></div>
                                                                                    <div className="flex items-center gap-4">{slot.totalPaid > 0 && <span className="text-sm font-black text-emerald-400">{CURRENCY}{slot.totalPaid.toLocaleString('en-IN')}</span>}{slot.status !== 'paid' && <button onClick={() => { setSelectedLoanId(loan.id); setNewTransaction({ amount: (slot.targetAmount - slot.totalPaid).toFixed(2), note: `EMI: ${slot.monthName}`, monthIndex: slot.index }); setShowAddPayment(true); }} className="text-[10px] font-black uppercase bg-purple-600 text-white px-5 py-2.5 rounded-xl transition-all hover:bg-purple-500">{selectedFriend.category === 'payable' ? 'Paid' : 'Received'}</button>}</div>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    {lumpsumPayments.length > 0 && (
                                                                        <div className="glass-panel rounded-[3rem] p-10 space-y-6">
                                                                            <div className="flex justify-between items-center text-emerald-400"><div className="flex items-center gap-4 font-black"><Icon name="History" size={24} /><p className="text-xs uppercase tracking-[0.3em]">Lumpsum History</p></div><div className="bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-xl text-xs font-black tracking-widest">TOTAL: {CURRENCY}{lumpsumTotal.toLocaleString('en-IN')}</div></div>
                                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{lumpsumPayments.map(p => (<div key={p.id} className="flex justify-between items-center bg-slate-950/40 p-5 rounded-3xl border border-slate-800"><div className="text-left"><p className="text-base font-black text-slate-200">{CURRENCY}{p.amount.toLocaleString('en-IN')}</p><p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{p.note || 'Lumpsum'}</p></div><p className="text-[10px] text-slate-500 font-black">{p.date}</p></div>))}</div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                            {!loan.isEmi && !stats.isPaid && <button onClick={() => { setSelectedLoanId(loan.id); setNewTransaction({ amount: '', note: '' }); setShowAddPayment(true); }} className={`w-full mt-8 py-5 text-white rounded-[2rem] font-black text-sm uppercase tracking-[0.2em] shadow-2xl transition-all ${selectedFriend.category === 'payable' ? 'bg-rose-600' : 'bg-blue-600'}`}>Log Payment</button>}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {(showAddDebt || showAddLoan) && (
                        <div className="fixed inset-0 z-50 modal-overlay">
                            <div className="bg-slate-900 w-full max-w-xl rounded-[3.5rem] shadow-2xl animate-slide-up border border-slate-800 modal-container p-12 mx-auto my-auto relative overflow-hidden">
                                <div className="shrink-0 mb-8 font-black text-3xl text-white tracking-tight">{isEditing ? 'Edit Transaction' : (showAddDebt ? 'Create Entry' : 'Add Entry')}</div>
                                <div className="modal-body hide-scrollbar">
                                    <form id="entryForm" onSubmit={showAddDebt ? handleCreateFriend : handleAddOrEditLoan} className="space-y-8">
                                        {showAddDebt && !isEditing && (
                                            <div className="space-y-8">
                                                <div className="space-y-3"><label className="text-[10px] font-black uppercase text-slate-500 px-2 tracking-[0.2em]">Category</label><div className="flex bg-slate-950 p-2 rounded-2xl border border-slate-800"><button type="button" onClick={() => setNewLoan({...newLoan, category: 'receivable'})} className={`flex-1 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${newLoan.category === 'receivable' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Receivable</button><button type="button" onClick={() => setNewLoan({...newLoan, category: 'payable'})} className={`flex-1 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${newLoan.category === 'payable' ? 'bg-rose-600 text-white' : 'text-slate-500'}`}>Payable</button></div></div>
                                                <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 px-2 tracking-[0.2em]">Name</label><input type="text" required className="w-full px-6 py-5 bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-white text-lg shadow-inner" value={newLoan.name} onChange={(e) => setNewLoan({...newLoan, name: e.target.value})} /></div>
                                            </div>
                                        )}
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 px-2 tracking-[0.2em]">Amount ({CURRENCY})</label><input type="number" required className="w-full px-6 py-5 bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-black text-3xl text-white shadow-inner" value={newLoan.amount} onChange={(e) => { const val = e.target.value; const suggested = val ? (val / (parseInt(newLoan.installments) || 12)).toFixed(2) : ''; setNewLoan({...newLoan, amount: val, customEmiAmount: suggested}); }} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 px-2 tracking-[0.2em]">Date</label><input type="date" required className="w-full px-6 py-5 bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm text-white shadow-inner" value={newLoan.date} onChange={(e) => setNewLoan({...newLoan, date: e.target.value})} /></div>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 px-2 tracking-[0.2em]">Reason / Title</label><input type="text" className="w-full px-6 py-5 bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-white text-lg" value={newLoan.note} onChange={(e) => setNewLoan({...newLoan, note: e.target.value})} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 px-2 tracking-[0.2em]">Description</label><textarea className="w-full px-6 py-5 bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-medium text-white resize-none h-28" value={newLoan.longNote} onChange={(e) => setNewLoan({...newLoan, longNote: e.target.value})} /></div>
                                        </div>
                                        <div className="p-8 bg-slate-950 rounded-[2.5rem] border border-slate-800">
                                            <label className="flex items-center justify-between cursor-pointer group"><div className="flex items-center gap-4 text-purple-400 font-black"><Icon name="CalendarCheck" size={24} /><span className="text-xs uppercase tracking-[0.3em]">Configure EMI</span></div><input type="checkbox" className="w-7 h-7 rounded-xl text-purple-600 bg-slate-800 border-slate-700" checked={newLoan.isEmi} onChange={(e) => { const ck = e.target.checked; setNewLoan({...newLoan, isEmi: ck, customEmiAmount: ck ? (newLoan.amount / 12).toFixed(2) : ''}); }} /></label>
                                            {newLoan.isEmi && (
                                                <div className="mt-8 pt-8 border-t border-slate-800 space-y-6 animate-slide-up">
                                                    <div className="flex items-center justify-between"><label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Duration</label><select className="bg-slate-900 border border-slate-700 text-white rounded-xl px-6 py-3 text-sm font-black outline-none shadow-lg" value={newLoan.installments} onChange={(e) => setNewLoan({...newLoan, installments: e.target.value, customEmiAmount: (newLoan.amount / e.target.value).toFixed(2)})}>{[3, 6, 9, 12, 18, 24, 36, 48].map(n => <option key={n} value={n}>{n} Months</option>)}</select></div>
                                                    <div className="space-y-2"><label className="text-[10px] font-black uppercase text-purple-500 px-2 tracking-widest">EMI ({CURRENCY})</label><input type="number" className="w-full px-6 py-4 bg-slate-900 border-2 border-purple-500/20 rounded-2xl outline-none focus:border-purple-500 font-black text-2xl text-purple-400 shadow-inner" value={newLoan.customEmiAmount} onChange={(e) => setNewLoan({...newLoan, customEmiAmount: e.target.value})} /></div>
                                                </div>
                                            )}
                                        </div>
                                    </form>
                                </div>
                                <div className="flex gap-4 pt-10 shrink-0 border-t border-slate-800/50 mt-6">
                                    <button type="button" onClick={() => { setShowAddDebt(false); setShowAddLoan(false); setIsEditing(false); }} className="flex-1 py-5 bg-slate-800 text-slate-400 font-black rounded-3xl text-xs uppercase tracking-[0.2em] hover:bg-slate-700 transition-all">Cancel</button>
                                    <button type="submit" form="entryForm" className={`flex-1 py-5 text-white font-black rounded-3xl text-xs uppercase tracking-[0.2em] shadow-2xl transition-all hover:scale-[1.02] ${(showAddDebt ? newLoan.category === 'payable' : selectedFriend.category === 'payable') ? 'bg-rose-600 shadow-rose-900/20' : 'bg-blue-600 shadow-blue-900/20'}`}>{isEditing ? 'Update Entry' : 'Confirm Entry'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAddPayment && (
                        <div className="fixed inset-0 z-50 modal-overlay">
                            <div className="bg-slate-900 w-full max-w-md rounded-[3.5rem] p-12 shadow-2xl animate-slide-up border border-slate-800 mx-auto my-auto text-center">
                                <h2 className="text-3xl font-black text-white mb-10 tracking-tight">{selectedFriend?.category === 'payable' ? 'Record Payment' : 'Log Payment'}</h2>
                                <form onSubmit={handleAddPayment} className="space-y-8">
                                    <div className="space-y-3"><label className="text-xs font-black uppercase text-slate-500 tracking-[0.3em]">Amount</label><input type="number" autoFocus required className="w-full px-8 py-8 bg-slate-800 border-none rounded-[2.5rem] outline-none focus:ring-4 focus:ring-emerald-500/20 focus:bg-slate-700 font-black text-5xl text-white tracking-tighter text-center" value={newTransaction.amount} onChange={(e) => setNewTransaction({...newTransaction, amount: e.target.value})} /></div>
                                    <div className="space-y-3"><label className="text-xs font-black uppercase text-slate-500 tracking-[0.3em]">Note</label><input type="text" className="w-full px-8 py-5 bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-white text-center text-lg" placeholder="GPay / Cash" value={newTransaction.note} onChange={(e) => setNewTransaction({...newTransaction, note: e.target.value})} /></div>
                                    <div className="flex gap-4 pt-6"><button type="button" onClick={() => setShowAddPayment(false)} className="flex-1 py-5 bg-slate-800 text-slate-400 font-black rounded-[2rem] text-xs uppercase tracking-widest hover:text-white transition-all">Cancel</button><button type="submit" className="flex-1 py-5 bg-emerald-600 text-white font-black rounded-[2rem] text-xs uppercase tracking-widest shadow-xl shadow-emerald-900/20 hover:bg-emerald-500 transition-all hover:scale-105">Log Payment</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-50 modal-overlay">
                            <div className="bg-slate-900 w-full max-w-lg rounded-[3.5rem] p-12 shadow-2xl animate-slide-up border border-slate-800 text-center mx-auto my-auto">
                                <div className="p-6 bg-slate-950 rounded-3xl border border-slate-800 mb-8 inline-block"><Icon name="Sync" size={48} className="text-blue-400" /></div>
                                <h2 className="text-3xl font-black text-white mb-4 tracking-tight">Sync Manager</h2>
                                <div className="p-6 bg-slate-950 rounded-3xl border border-slate-800 mb-8 relative group text-center">
                                    <p className="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-[0.3em]">Your Device Sync ID</p>
                                    <p className="font-mono text-sm text-blue-400 break-all select-all font-bold">{user?.uid}</p>
                                    <button onClick={() => { navigator.clipboard.writeText(user.uid); }} className="absolute top-4 right-4 text-slate-700 hover:text-blue-400 transition-colors"><Icon name="Copy" size={14} /></button>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex gap-3">
                                        <input type="text" placeholder="Enter other device ID..." className="flex-grow bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm font-bold text-white outline-none focus:border-blue-500 shadow-inner" value={manualId} onChange={(e) => setManualId(e.target.value)} />
                                        <button onClick={joinSyncId} className="bg-blue-600 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-500 transition-all shadow-xl shadow-blue-900/20">Link ID</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={exportData} className="flex items-center justify-center gap-3 p-5 bg-slate-800 border border-slate-700 rounded-3xl hover:bg-slate-700 transition-all shadow-sm"><Icon name="Download" className="text-blue-400" size={18} /><span className="font-black text-white uppercase text-[10px]">Export</span></button>
                                        <label className="flex items-center justify-center gap-3 p-5 bg-slate-800 border border-slate-700 rounded-3xl cursor-pointer hover:bg-slate-700 transition-all shadow-sm"><Icon name="Upload" className="text-emerald-400" size={18} /><span className="font-black text-white uppercase text-[10px]">Import</span><input type="file" className="hidden" accept=".json" onChange={importData} /></label>
                                    </div>
                                    <div className="pt-10"><button onClick={() => setShowSettings(false)} className="w-full py-5 bg-slate-800 text-slate-400 font-black rounded-[2.5rem] text-[10px] uppercase tracking-[0.3em] hover:text-white transition-all shadow-xl">Return to App</button></div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
